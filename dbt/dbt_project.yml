name: 'zakaflow'
version: '1.0.0'
config-version: 2

# This setting configures which profile dbt uses for this project
profile: 'zakaflow'

# These paths are where dbt will look for files of each type
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
models:
  zakaflow:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
